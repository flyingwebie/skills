<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Swiper Studio</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="./effect-panorama.min.css" />

    <style>
      /** Demo styles **/
      html,
      body {
        padding: 0;
        margin: 0;
        position: relative;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
      }
      body {
        background: #000;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          "Noto Sans",
          sans-serif;
        overflow: hidden;
      }

      /** Swiper styles **/

      :root {
        --swiper-pagination-color: rgba(255, 255, 255, 1);
        --swiper-pagination-bullet-inactive-color: rgba(255, 255, 255, 1);
      }

      .swiper {
        user-select: none;
        box-sizing: border-box;
        overflow: visible;
        width: 100%;

        height: 300px;

        padding: 0px 0px;
      }

      .swiper-slide {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        position: relative;
        box-sizing: border-box;
      }

      .swiper-slide-bg-image {
        position: absolute;
        left: 0%;
        top: 0%;
        width: 100%;
        height: 100%;
        max-width: none;
        z-index: 0;
      }

      .swiper-slide-4ffe {
        background-color: rgba(51, 51, 51, 1);
      }
      .swiper-slide-bg-image-bdb6 {
        object-fit: cover;
        border-radius: inherit;
        opacity: 1;
      }

      @media (min-width: 768px) {
        .swiper {
          width: 100%;

          height: 300px;

          padding: 0px 0px;
        }

        .swiper-slide {
          width: 100%;
          height: 100%;
        }
      }

      @media (min-width: 1024px) {
        .swiper {
          width: 100%;

          height: 300px;

          padding: 0px 0px;
        }

        .swiper-slide {
          width: 100%;
          height: 100%;
        }
      }

      @media (min-width: 1280px) {
        .swiper {
          width: 100%;

          height: 300px;

          padding: 0px 0px;
        }

        .swiper-slide {
          width: 100%;
          height: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="swiper swiper-bronze-poggle-the-lesser-356">
      <div class="swiper-wrapper">
        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6"
            src="https://studio.swiperjs.com/demo-images/nature/01.jpg"
          />

          <div class="swiper-slide-content swiper-slide-content-2f5e"></div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6"
            src="https://studio.swiperjs.com/demo-images/nature/02.jpg"
          />

          <div class="swiper-slide-content swiper-slide-content-2f5e"></div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6"

          />

          <div class="swiper-slide-content swiper-slide-content-2f5e"></div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">

            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6"

          <div class="swiper-slide-content swiper-slide-content-2f5e"></div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img

          />

          <div class="swiper-slide-content swiper-slide-content-2f5e"></div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6"
            src="https://studio.swiperjs.com/demo-images/nature/06.jpg"
          />

          <div class="swiper-slide-content swiper-slide-content-2f5e"></div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6"

        <div class="swiper-slide swiper-slide-4ffe">

          />

          <div class="swiper-slide-content swiper-slide-content-2f5e"></div>
        </div>
      </div>

      <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <script src="./effect-panorama.min.js"></script>

    <script>
      var swiper = new Swiper(".swiper", {
        modules: [EffectPanorama],
        centeredSlides: true,
        loop: true,
        effect: "panorama",
        panoramaEffect: { rotate: 45 },
        speed: 600,
        pagination: { enabled: true, el: ".swiper-pagination" },
        autoplay: { enabled: true },
        breakpoints: {
          768: { slidesPerView: 3, panoramaEffect: { depth: 150, rotate: 30 } },
          1024: { slidesPerView: 4 },
          1280: {
            slidesPerView: 5,
            panoramaEffect: { depth: 250, rotate: 25 },
          },
        },
      });
    </script>
  </body>
</html>
