<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Swiper Studio</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <style>
      /** Demo styles **/
      html,
      body {
        padding: 0;
        margin: 0;
        position: relative;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
      }
      body {
        background: #000;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          "Noto Sans",
          sans-serif;
        overflow: hidden;
      }

      /** Swiper styles **/

      :root {
        --swiper-pagination-color: rgba(181, 255, 0, 1);
        --swiper-pagination-bullet-inactive-color: rgba(181, 255, 0, 1);
      }

      .swiper {
        user-select: none;
        box-sizing: border-box;
        overflow: hidden;
        width: 100%;

        height: 320px;

        padding: 0px 0px;
      }

      .swiper-slide {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 220px;
        height: 100%;
        position: relative;
        box-sizing: border-box;
      }

      .swiper-slide-content {
        width: 100%;
        height: 100%;
        display: flex;
        position: relative;
        z-index: 1;
        box-sizing: border-box;
      }

      .swiper-slide-61af {
        background-color: rgba(29, 38, 5, 1);
        border: 2px solid rgba(181, 255, 0, 1);
        border-radius: 24px;
      }
      .swiper-slide-content-d0d6 {
        padding: 48px 48px;
        flex-direction: column;
        gap: 16px;
        align-items: center;
        justify-content: center;
      }
      .swiper-slide-text-8eb8 {
        color: rgba(181, 255, 0, 1);
        text-align: left;
        font-size: 24px;
        line-height: 1.5;
        font-weight: bold;
      }
      .swiper-slide-text-700a {
        color: rgba(181, 255, 0, 1);
        text-align: left;
        font-size: 14px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="swiper swiper-aqua-luke-skywalker-321">

        <div class="swiper-slide swiper-slide-61af">

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <script>
      var swiper = new Swiper(".swiper", {
        slidesPerView: "auto",
        centeredSlides: true,
        spaceBetween: 24,
        pagination: { clickable: true, el: ".swiper-pagination" },
      });
    </script>

</html>
