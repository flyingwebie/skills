      html,

        display: flex;

      /** Swiper styles **/

      .swiper {
        user-select: none;
        box-sizing: border-box;
        overflow: hidden;
        width: 100%;

        height: 100%;

        padding: 16px 16px;
      }

      .swiper-slide {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        position: relative;
        box-sizing: border-box;
      }

      .swiper-slide-bg-image {
        position: absolute;
        left: 0%;
        top: 0%;
        width: 100%;
        height: 100%;
        max-width: none;
        z-index: 0;
      }

      .swiper-slide-content {
        width: 100%;
        height: 100%;
        display: flex;
        position: relative;
        z-index: 1;
        box-sizing: border-box;
      }

        --swiper-material-slide-border-radius: 32px;
      }
      .swiper-slide-bg-image-bdb6 {

        border-radius: inherit;
        opacity: 1;
      }
      .swiper-slide-content-609f {

        flex-direction: column;
        gap: 0px;
