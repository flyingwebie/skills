      html,
      body {
        padding: 0;
        margin: 0;
        position: relative;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;

        overflow: hidden;
      }

      /** Swiper styles **/

        box-sizing: border-box;
        overflow: hidden;
        width: 380px;

        padding: 0px 0px;
      }

      .swiper-slide {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        position: relative;
        box-sizing: border-box;
      }

      .swiper-slide-content {
        width: 100%;
        height: 100%;
        display: flex;
        position: relative;
        z-index: 1;
        box-sizing: border-box;

        transform-style: preserve-3d;
      }

      .swiper-slide-af26 {
        border-radius: 16px;
      }
      .swiper-slide-content-1a7e {

        gap: 0px;
        align-items: center;
        justify-content: flex-start;
        border-radius: 16px;
        padding: 0px 0px;
      }
      .swiper-slide-image-faa0 {
        max-width: 100%;
        min-width: 0;
        max-height: 100%;
        min-height: 0;
        object-fit: contain;
        opacity: 1;
