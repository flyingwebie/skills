<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Swiper Studio</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="./effect-shutters.min.css" />

    <style>
      /** Demo styles **/
      html,
      body {
        padding: 0;
        margin: 0;
        position: relative;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
      }
      body {
        background: #000;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          "Noto Sans",
          sans-serif;
        overflow: hidden;
      }

      /** Swiper styles **/

      :root {
        --swiper-pagination-color: rgba(255, 255, 255, 1);
        --swiper-pagination-bullet-inactive-color: rgba(255, 255, 255, 1);
      }

      .swiper {
        user-select: none;
        box-sizing: border-box;
        overflow: hidden;
        width: 100%;

        height: 100%;

        padding: 0px 0px;
      }

      .swiper-slide {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        position: relative;
        box-sizing: border-box;
      }

      .swiper-slide-bg-image {
        position: absolute;
        left: 0%;
        top: 0%;
        width: 100%;
        height: 100%;
        max-width: none;
        z-index: 0;
      }

      .swiper-slide-content {
        width: 100%;
        height: 100%;
        display: flex;
        position: relative;
        z-index: 1;
        box-sizing: border-box;
      }

      .swiper-slide-4ffe {
        background-color: rgba(51, 51, 51, 1);
      }
      .swiper-slide-bg-image-bdb6 {
        object-fit: cover;
        border-radius: inherit;
        opacity: 1;
      }
      .swiper-slide-content-b827 {
        padding: 48px 48px;
        flex-direction: column;
        gap: 0px;
        align-items: flex-start;
        justify-content: flex-end;
      }
      .swiper-slide-text-78dc {
        color: rgba(255, 255, 255, 1);
        text-align: left;
        font-size: 24px;
        line-height: 1.5;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="swiper swiper-silly-tuna-850">
      <div class="swiper-wrapper">
        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6 swiper-shutters-image"
            src="https://studio.swiperjs.com/demo-images/models/01.jpg"
          />

          <div class="swiper-slide-content swiper-slide-content-b827">
            <div class="swiper-slide-text swiper-slide-text-78dc">Olivia</div>
          </div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6 swiper-shutters-image"
            src="https://studio.swiperjs.com/demo-images/models/02.jpg"
          />

          <div class="swiper-slide-content swiper-slide-content-b827">
            <div class="swiper-slide-text swiper-slide-text-78dc">Emma</div>
          </div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6 swiper-shutters-image"
            src="https://studio.swiperjs.com/demo-images/models/03.jpg"
          />

          <div class="swiper-slide-content swiper-slide-content-b827">
            <div class="swiper-slide-text swiper-slide-text-78dc">
              Charlotte
            </div>
          </div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img

          <div class="swiper-slide-content swiper-slide-content-b827">
            <div class="swiper-slide-text swiper-slide-text-78dc">Amelia</div>
          </div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6 swiper-shutters-image"
            src="https://studio.swiperjs.com/demo-images/models/05.jpg"

          <div class="swiper-slide-content swiper-slide-content-b827">

        <div class="swiper-slide swiper-slide-4ffe">

            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6 swiper-shutters-image"
            src="https://studio.swiperjs.com/demo-images/models/07.jpg"
          />

          <div class="swiper-slide-content swiper-slide-content-b827">

          </div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6 swiper-shutters-image"

          />

          <div class="swiper-slide-content swiper-slide-content-b827">
            <div class="swiper-slide-text swiper-slide-text-78dc">Mia</div>
          </div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6 swiper-shutters-image"
            src="https://studio.swiperjs.com/demo-images/models/09.jpg"
          />

          <div class="swiper-slide-content swiper-slide-content-b827">
            <div class="swiper-slide-text swiper-slide-text-78dc">Evelyn</div>
          </div>
        </div>

        <div class="swiper-slide swiper-slide-4ffe">
          <img
            class="swiper-slide-bg-image swiper-slide-bg-image-bdb6 swiper-shutters-image"
            src="https://studio.swiperjs.com/demo-images/models/10.jpg"
          />

          <div class="swiper-slide-content swiper-slide-content-b827">
            <div class="swiper-slide-text swiper-slide-text-78dc">Harper</div>
          </div>
        </div>
      </div>

      <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <script src="./effect-shutters.min.js"></script>

    <script>
      var swiper = new Swiper(".swiper", {
        modules: [EffectShutters],
        effect: "shutters",
        pagination: { clickable: true, el: ".swiper-pagination" },
      });
    </script>
  </body>
</html>
